name: Upload Software to TIRA

on:
  workflow_dispatch:
    inputs:
      directory:
        description: 'The directory that contains the submission. Can be . for the root of the repository'
        required: true
        default: .

jobs:
  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 1024

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install huggingface_hub tira

      - name: Download model from Hugging Face (outside repo)
        run: |
          python -c "
          from huggingface_hub import snapshot_download
          snapshot_download(
              repo_id='Yihao-Jia/eist',
              local_dir='/tmp/hf_model',
              local_dir_use_symlinks=False
          )
          "
          ls -lh /tmp/hf_model/model.safetensors

      - name: Prepare clean submission directory
        run: |
          rm -rf /tmp/submission
          mkdir -p /tmp/submission

          # Copy all repository files (excluding .git)
          rsync -av --exclude='.git' ./ /tmp/submission/

          # Inject the downloaded model
          rm -rf /tmp/submission/model
          cp -r /tmp/hf_model /tmp/submission/model

          cd /tmp/submission
          git init
          git config user.email "tira@ci.local"
          git config user.name "tira-ci"
          git add .
          git commit -m "submission with model"

          echo "=== Submission summary ==="
          ls -lh /tmp/submission/model/model.safetensors

      - name: Build and upload to TIRA
        run: |
          tira-cli login --token ${{ secrets.TIRA_CLIENT_TOKEN }}
          tira-cli verify-installation --task generative-ai-authorship-verification-panclef-2026 --team Yi_hao || true
          tira-cli code-submission \
            --path /tmp/submission \
            --task generative-ai-authorship-verification-panclef-2026 \
            --dataset pan26-generative-ai-detection-smoke-test-20260330-training
