name: Upload Software to TIRA

on:
  workflow_dispatch:
    inputs:
      directory:
        description: 'The directory that contains the submission. Can be . for the root of the repository'
        required: true
        default: .

jobs:
  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 1024

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Dependencies
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # ✅ 安装下载模型所需依赖
      - name: Install required python packages
        run: |
          python -m pip install --upgrade pip
          pip install tira huggingface_hub

      # ✅ 下载 HuggingFace 模型到本地 model/
      - name: Download HuggingFace model to local model/ directory
        run: |
          python -c "
          from huggingface_hub import snapshot_download
          snapshot_download(
              repo_id='Yihao-Jia/eist',
              local_dir='model',
              local_dir_use_symlinks=False
          )
          "
          echo '=== model directory files ==='
          ls -lh model
          echo '=== check model.safetensors ==='
          ls -lh model/model.safetensors

      - name: Build, test, and upload image
        run: |
          tira-cli login --token ${{ secrets.TIRA_CLIENT_TOKEN }}
          tira-cli verify-installation --task generative-ai-authorship-verification-panclef-2026 --team Yi_hao || true
          tira-cli code-submission \
            --path ${{ inputs.directory }} \
            --task generative-ai-authorship-verification-panclef-2026 \
            --dataset pan26-generative-ai-detection-smoke-test-20260330-training
